<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="/favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EP/RR Learning Diagnostic · ĒMA Impact Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shrikhand&family=Oswald:wght@300;400;600&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/leftnav.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#ec482f;--red-dk:#c23018;--red-lt:#fef0ed;
  --green:#123939;--green-lt:#ecefe1;
  --yellow:#f2a136;--yellow-lt:#fff3dc;
  --warn-lt:#fff8ee;
  --dark:#2C2C2C;--mid:#5A5A5A;--light:#999;
  --border:#E0E0E0;--bg:#fdf7f3;--white:#fff;
}
html{font-size:14px}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}

/* ── LOGIN ── */
.login-view{display:none;flex-direction:column;min-height:100vh;align-items:center;justify-content:center;padding:40px 16px;background:var(--bg)}
body.show-login .login-view{display:flex}
body.logged-in .login-view{display:none!important}
.login-box{width:100%;max-width:360px;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:40px 36px 36px;box-shadow:0 4px 24px rgba(0,0,0,.07)}
.login-title{font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;color:var(--dark);text-align:center;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--mid);text-align:center;margin-bottom:28px;line-height:1.5}
.login-err{background:var(--red-lt);border:1px solid rgba(236,72,47,.2);border-left:3px solid var(--red);border-radius:6px;padding:9px 12px;font-size:12px;color:var(--red-dk);margin-bottom:18px;display:none}
.login-err.show{display:block}
.field{margin-bottom:14px}
.field label{display:block;font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--mid);margin-bottom:5px}
.field input{width:100%;font-family:'Lato',sans-serif;font-size:14px;padding:10px 12px;border:1px solid var(--border);border-radius:7px;background:var(--white);color:var(--dark);outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--green)}
.login-btn{width:100%;background:var(--red);color:var(--white);border:none;border-radius:7px;padding:12px 0;font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;margin-top:6px;transition:background .15s}
.login-btn:hover{background:var(--red-dk)}

/* ── PORTAL ── */
.portal-view{display:none;flex-direction:column;min-height:100vh}
body.logged-in .portal-view{display:flex}

/* ── NAV ── */
.nav{background:var(--red);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 36px;position:sticky;top:0;z-index:300;box-shadow:0 1px 8px rgba(0,0,0,.18);flex-shrink:0}
.nav-left{display:flex;align-items:center;gap:14px}
.nav-logo{height:30px;width:auto;display:block}
.nav-hub{font-family:'Oswald',sans-serif;font-size:12px;color:rgba(255,255,255,.8);text-transform:uppercase;letter-spacing:1.5px;padding-left:14px;border-left:1px solid rgba(255,255,255,.3)}
.nav-hub a{color:rgba(255,255,255,.8);text-decoration:none}
.nav-hub a:hover{color:var(--white)}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-sep{width:1px;height:20px;background:rgba(255,255,255,.25)}
.nav-scope{display:flex;flex-direction:column;gap:1px;font-family:'Oswald',sans-serif;color:rgba(255,255,255,.95);padding:0 4px}
.nav-scope-lbl{font-size:9px;font-weight:300;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.55)}
.nav-scope-val{font-size:12px;font-weight:600}
.nav-user{display:flex;align-items:center;gap:10px}
.nav-avatar{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;color:var(--white)}
.nav-name{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;color:var(--white)}
.nav-role{font-family:'Oswald',sans-serif;font-size:11px;font-weight:300;color:rgba(255,255,255,.7);letter-spacing:.5px;text-transform:uppercase}
.nav-signout{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:rgba(255,255,255,.7);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:4px;transition:all .15s}
.nav-signout:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.95)}
.nav-link{font-family:'Oswald',sans-serif;font-size:12px;font-weight:400;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.85);text-decoration:none;padding:6px 13px;border:1px solid rgba(255,255,255,.35);border-radius:5px;transition:all .15s}
.nav-link:hover{color:var(--white);border-color:rgba(255,255,255,.6)}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden;position:relative}
.main{flex:1;overflow-y:auto;overflow-x:clip;padding:0 0 40px;min-width:0}

/* ── REPORT HEADER ── */
.report-hdr{background:var(--bg);border-bottom:2px solid var(--red);padding:14px 28px;display:flex;align-items:baseline;gap:14px}
.rh-eyebrow{font-family:'Oswald',sans-serif;font-size:10px;font-weight:300;text-transform:uppercase;letter-spacing:2px;color:var(--mid)}
.rh-title{font-family:'Shrikhand',cursive;font-size:20px;color:var(--dark)}

/* ── CONTENT ── */
.content{padding:24px 28px}

/* ── Loading / error ── */
.state-msg{text-align:center;padding:60px 20px;font-family:'Oswald',sans-serif;font-size:13px;font-weight:300;letter-spacing:1px;text-transform:uppercase;color:var(--light)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{background:var(--red-lt);border-left:3px solid var(--red);border-radius:4px;padding:12px 16px;font-size:13px;color:var(--red-dk)}

/* ── Scope note ── */
.scope-note{background:var(--green-lt);border-left:3px solid var(--green);padding:10px 14px;border-radius:0 4px 4px 0;font-size:12px;color:var(--mid);margin-bottom:18px;line-height:1.5}

/* ── Section cards ── */
.section{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px}
.section-head{padding:11px 18px 9px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:10px}
.section-eyebrow{font-family:'Oswald',sans-serif;font-size:10px;font-weight:300;text-transform:uppercase;letter-spacing:2px;color:var(--mid);flex-shrink:0}
.section-title{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--green)}
.section-body{padding:13px 18px}
.subsection{font-family:'Oswald',sans-serif;font-size:11px;font-weight:400;text-transform:uppercase;letter-spacing:.8px;color:var(--green);border-top:1px solid var(--green-lt);padding-top:9px;margin:13px 0 7px}

/* ── Synthesis banner ── */
.synthesis{background:var(--green);border-radius:10px;padding:16px 18px;margin-bottom:16px}
.verdict-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-top:8px}
.verdict-card{background:rgba(255,255,255,.1);border-left:4px solid var(--yellow);border-radius:4px;padding:10px 12px;color:rgba(255,255,255,.88);font-size:12px;line-height:1.5}
.verdict-card.flag{border-left-color:var(--red)}
.verdict-card .vlabel{font-family:'Oswald',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--yellow);margin-bottom:4px}
.verdict-card.flag .vlabel{color:#ff9f8e}

/* ── KPI grid ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin:10px 0}
.kpi-card{background:var(--green-lt);border-radius:6px;padding:10px 12px;text-align:center}
.kpi-card .knum{font-family:'Shrikhand',cursive;font-size:1.9rem;color:var(--green)}
.kpi-card .klbl{font-family:'Oswald',sans-serif;font-size:10px;font-weight:300;text-transform:uppercase;color:var(--mid);letter-spacing:.06em;margin-top:2px}
.kpi-card.kred{background:var(--red-lt)}.kpi-card.kred .knum{color:var(--red)}
.kpi-card.kywarn{background:var(--yellow-lt)}.kpi-card.kywarn .knum{color:var(--yellow)}

/* ── Callouts ── */
.callout{border-left:4px solid var(--yellow);background:var(--warn-lt);padding:8px 12px;border-radius:0 4px 4px 0;margin:7px 0;font-size:12px;line-height:1.5}
.callout.alert{border-left-color:var(--red);background:var(--red-lt)}
.callout.info{border-left-color:var(--green);background:var(--green-lt)}
.callout strong{display:block;margin-bottom:2px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.04em;font-size:11px}

/* ── Tables ── */
.tbl-wrap{overflow-x:auto;margin:6px 0 10px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
table th{background:var(--green);color:var(--white);text-align:left;padding:6px 9px;font-family:'Oswald',sans-serif;font-weight:400;text-transform:uppercase;letter-spacing:.05em;font-size:11px;white-space:nowrap}
table td{padding:5px 9px;border-bottom:1px solid var(--border);vertical-align:top}
tr:nth-child(even) td{background:var(--bg)}
tr:hover td{background:var(--red-lt)}

/* ── Tags/badges ── */
.tag{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:700;margin:0 1px}
.tag-A{background:var(--green);color:var(--white)}
.tag-B{background:var(--yellow);color:var(--dark)}
.tag-C{background:var(--green-lt);color:var(--green)}
.tag-flip{background:var(--red);color:var(--white)}
.tag-same{background:#e0e0e0;color:#555}
.warn-badge{background:var(--yellow);color:var(--dark);padding:1px 6px;border-radius:3px;font-size:11px;font-weight:700}
.ok{color:#1a6a1a;font-weight:700}
.ambig{color:#6a4a00;font-style:italic}
.flag-text{color:var(--red);font-weight:700}
.marker-tag{display:inline-block;padding:1px 7px;border-radius:3px;font-size:11px;background:var(--green-lt);color:var(--green);font-family:'Oswald',sans-serif;font-weight:300;text-transform:uppercase;letter-spacing:.04em}
.proposed-note{font-size:11px;color:var(--mid);font-style:italic;margin-bottom:8px}
.footnote{font-size:11px;color:var(--mid);margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-view">
  <div class="login-box">
    <div class="login-title">ĒMA Impact Hub</div>
    <div class="login-sub">Sign in with your ĒMA account</div>
    <div class="login-err" id="login-err">Incorrect username or password.</div>
    <div class="field"><label>Username</label><input type="text" id="lu" autocomplete="username" placeholder="your.name"></div>
    <div class="field"><label>Password</label><input type="password" id="lp" autocomplete="current-password" placeholder="••••••••"></div>
    <button class="login-btn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- PORTAL -->
<div class="portal-view">

  <nav class="nav">
    <div class="nav-left">
      <a href="/"><img class="nav-logo" src="/email-logo.png" alt="EMA"></a>
      <div class="nav-hub"><a href="/">Impact Hub</a></div>
    </div>
    <div class="nav-right">
      <div class="nav-scope">
        <div class="nav-scope-lbl">Viewing</div>
        <div class="nav-scope-val">All Affiliates</div>
      </div>
      <div class="nav-sep"></div>
      <div class="nav-user">
        <div class="nav-avatar" id="nav-avatar"></div>
        <div>
          <div class="nav-name" id="nav-name"></div>
          <div class="nav-role" id="nav-role"></div>
        </div>
      </div>
      <div class="nav-sep"></div>
      <button class="nav-signout" onclick="doSignOut()">Sign Out</button>
      <a class="nav-link" href="https://trellisplatform.com" target="_blank" rel="noopener">Go to Trellis &rarr;</a>
    </div>
  </nav>

  <div class="layout">
    <div class="main">

      <div class="report-hdr">
        <span class="rh-eyebrow">HQ Resources &middot; KPI Diagnostic</span>
        <span class="rh-title">EP/RR Learning Diagnostic</span>
      </div>

      <div class="content">
        <div id="state" class="state-msg"><div class="spinner"></div>Loading diagnostic data&hellip;</div>
        <div id="report" style="display:none"></div>
      </div>

    </div>
  </div>

</div><!-- /portal-view -->

<script defer src="/js/leftnav.js"></script>
<script>
'use strict';

// ── AUTH ─────────────────────────────────────────────────────
async function doLogin() {
  var u = document.getElementById('lu').value.trim().toLowerCase();
  var p = document.getElementById('lp').value;
  var err = document.getElementById('login-err');
  err.classList.remove('show');
  try {
    var r = await fetch('/api/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p})});
    if (!r.ok) { err.classList.add('show'); return; }
    var mr = await fetch('/api/me');
    if (mr.ok) { var md = await mr.json(); if (md.user) { applySession(md.user); return; } }
    err.classList.add('show');
  } catch(e) { err.classList.add('show'); }
}

async function doSignOut() {
  try { await fetch('/api/logout', {method:'POST'}); } catch(e) {}
  window.location.href = '/';
}

function applySession(u) {
  if (u.role !== 'administrator') { window.location.href = '/'; return; }
  document.body.classList.remove('show-login');
  document.body.classList.add('logged-in');
  var first = u.firstName || '', last = u.lastName || '';
  document.getElementById('nav-avatar').textContent = ((first[0]||'')+(last[0]||'')).toUpperCase();
  document.getElementById('nav-name').textContent = (first+' '+last).trim();
  document.getElementById('nav-role').textContent = 'HQ Admin';
  loadDiagnostic();
}

(async function init() {
  try {
    var r = await fetch('/api/me');
    if (r.ok) { var d = await r.json(); if (d.user) { applySession(d.user); return; } }
  } catch(e) {}
  document.body.classList.add('show-login');
})();

// ── HELPERS ──────────────────────────────────────────────────
function pf(v,d){ d=d||2; return v==null?null:parseFloat(parseFloat(v).toFixed(d)); }
function esc(s){ return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function rateCell(num,den){ if(!den) return '<em style="color:#aaa">no data</em>'; var pct=Math.round(1000*num/den)/10; return num+'/'+den+' ('+pct+'%)'+(den<30?' <span class="warn-badge">small-n</span>':''); }
function smallN(n){ return n<30?' <span class="warn-badge">n='+n+' caution</span>':''; }
function median(arr){ if(!arr.length) return null; var s=arr.slice().sort(function(a,b){return a-b;}); var m=Math.floor(s.length/2); return s.length%2===0?(s[m-1]+s[m])/2:s[m]; }
function proposeMarker(label){
  if(!label) return 'Unclear';
  var l=label.toLowerCase();
  if(/recogni|identif|aware|notice|trigger|pattern|what is|what isn/.test(l)) return 'Identify & Recognize';
  if(/reflect|understand|why|how|meaning|concept|theor|insight/.test(l))      return 'Reflect & Understand';
  if(/appl|practice|use|skill|implement|daily|life|do\b|action/.test(l))      return 'Apply & Practice';
  if(/evaluat|priorit|assess|need|stress|decid|choose|important|first/.test(l)) return 'Evaluate & Prioritize';
  return 'Unclear';
}

// ── FETCH ────────────────────────────────────────────────────
async function loadDiagnostic() {
  try {
    var r = await fetch('/api/ep-rr-diagnostic');
    if (!r.ok) {
      var body = {};
      try { body = await r.json(); } catch(e) {}
      throw new Error((body.error||r.statusText)+(body.detail?' | '+body.detail:'')+(body.hint?' | Hint: '+body.hint:''));
    }
    var data = await r.json();
    document.getElementById('state').style.display = 'none';
    var el = document.getElementById('report');
    el.innerHTML = render(data);
    el.style.display = '';
  } catch(e) {
    document.getElementById('state').innerHTML = '<div class="err-box">Failed to load: '+esc(e.message)+'</div>';
  }
}

// ── RENDER ───────────────────────────────────────────────────
function render(d) {
  var meta=d.meta, schema=d.schema||[], templates=d.templates||[], pairedData=d.pairedData||[],
      questions=d.questions||[], momResults=d.momResults||[], itemMovement=d.itemMovement||{},
      teishaRows=d.teishaRows||[], teishaDomains=d.teishaDomains||[],
      affiliateFunnel=d.affiliateFunnel||{}, rates=d.rates||{ep:{A:{num:0,den:0},B:{num:0,den:0},C:{num:0,den:0}},rr:{A:{num:0,den:0},B:{num:0,den:0},C:{num:0,den:0}}},
      counts=d.counts||{};

  var legacyTemplates = templates.filter(function(t){return t.track_group==='Legacy';});
  var currentTemplates = templates.filter(function(t){return t.track_group!=='Legacy'&&t.track_group!=='Other';});
  var epMoms = momResults.filter(function(m){return m.track_group==='EP';});
  var rrMoms = momResults.filter(function(m){return m.track_group==='RR';});

  var rrRobust = rates.rr.A.den>0&&rates.rr.A.num===0&&rates.rr.B.den>0&&rates.rr.B.num===0&&rates.rr.C.den>0&&rates.rr.C.num===0;
  var captureIsAnswer = (counts.total_completions||0)<10||((counts.with_pair||0)/Math.max(counts.total_completions||1,1)<0.5);
  var highCeilItems = questions.filter(function(q){return q.template_type==='pre'&&q.answered>0&&q.at_ceiling/q.answered>0.4;});
  var latDays = pairedData.filter(function(r){return r.has_pair;}).map(function(r){
    return Math.round((new Date(r.post.ar_date)-new Date(r.pre.ar_date))/86400000);
  }).sort(function(a,b){return a-b;});
  var genDate = new Date(meta.generated).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

  var html = '';

  // ── Overview ──
  html += '<div style="background:var(--white);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:14px">'
    +'<div style="font-family:\'Oswald\',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--green);margin-bottom:8px">What this report does</div>'
    +'<p style="font-size:13px;line-height:1.6;color:var(--dark);margin-bottom:8px">KPI 3 measures learning progress for moms in our Empowered Parenting (EP) and Roadmap to Resilience (RR) programs. A mom "counts" as improved if her post-program assessment score is higher than her pre-program score. This report investigates <strong>three possible reasons KPI 3 is low</strong> — in the order they should be addressed.</p>'
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;font-size:12px">'
    +'<div style="background:var(--red-lt);border-radius:6px;padding:9px 11px"><strong style="font-family:\'Oswald\',sans-serif;color:var(--red);display:block;margin-bottom:3px">① Data Capture</strong>Do we have both a pre-test and post-test on file for each mom who completed the program?</div>'
    +'<div style="background:var(--yellow-lt);border-radius:6px;padding:9px 11px"><strong style="font-family:\'Oswald\',sans-serif;color:#8a6000;display:block;margin-bottom:3px">② Scoring Method</strong>Does the way we calculate the score affect who counts as improved — and would a different method give a different result?</div>'
    +'<div style="background:var(--green-lt);border-radius:6px;padding:9px 11px"><strong style="font-family:\'Oswald\',sans-serif;color:var(--green);display:block;margin-bottom:3px">③ Assessment Design</strong>Are the questions themselves able to detect improvement, or do they start too high for most moms to go higher?</div>'
    +'</div>'
    +'<div style="font-size:11px;color:var(--light);margin-top:10px">Data window: '+esc(meta.data_start)+' through today &nbsp;·&nbsp; Legacy templates excluded &nbsp;·&nbsp; NPP and AAPI excluded &nbsp;·&nbsp; Generated '+genDate+'</div>'
    +'</div>';

  // ── Scoring method reference ──
  html += '<div style="background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 20px;margin-bottom:14px">'
    +'<div style="font-family:\'Oswald\',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--green);margin-bottom:10px">The three scoring methods tested in this report</div>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px">'
    // Method A
    +'<div style="border-left:3px solid var(--green);padding:9px 12px;background:var(--bg);border-radius:0 6px 6px 0">'
    +'<div style="font-family:\'Oswald\',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--green);margin-bottom:4px">Method A &nbsp;·&nbsp; Domain-weighted average</div>'
    +'<div style="font-size:12px;line-height:1.6;color:var(--dark)">Score each topic area (domain) separately, then average those topic scores together. If Self-Regulation has 10 questions and Parental Connection has 4, each topic still counts equally. <span style="color:var(--mid)">Used in the Trellis Track Journey view.</span></div>'
    +'</div>'
    // Method B
    +'<div style="border-left:3px solid var(--border);padding:9px 12px;background:var(--bg);border-radius:0 6px 6px 0">'

    var epT=epMoms.filter(function(m){return m.post_B!=null&&m.pre_B!=null&&m.post_B-m.pre_B>0.5;}).length,epTd=epMoms.filter(function(m){return m.post_B!=null&&m.pre_B!=null;}).length;
    var rrT=rrMoms.filter(function(m){return m.post_B!=null&&m.pre_B!=null&&m.post_B-m.pre_B>0.5;}).length,rrTd=rrMoms.filter(function(m){return m.post_B!=null&&m.pre_B!=null;}).length;
    html += '<tr><td>Post - Pre &gt; 0.5 (non-trivial)</td><td>'+rateCell(epT,epTd)+'</td><td>'+rateCell(rrT,rrTd)+'</td><td>Filters trivial movement</td></tr>';
    var epReg=epMoms.filter(function(m){return !m.improved_C&&m.pre_C!=null;}).length,epRd=epMoms.filter(function(m){return m.pre_C!=null;}).length;
    var rrReg=rrMoms.filter(function(m){return !m.improved_C&&m.pre_C!=null;}).length,rrRd=rrMoms.filter(function(m){return m.pre_C!=null;}).length;
    html += '<tr><td class="ambig">Apparent regressions (post &lt; pre)</td><td>'+rateCell(epReg,epRd)+'</td><td>'+rateCell(rrReg,rrRd)+'</td><td class="ambig">AMBIGUOUS, not failure. Honest self-assessment after learning.</td></tr>';
    html += '</tbody></table></div>';
  }
  html += '</div></div>';

  // ── Phase 4 ──
  html += '<div class="section"><div class="section-head"><span class="section-eyebrow">Detail B &nbsp;·&nbsp; Finding ③</span><span class="section-title">Question-by-Question Performance</span></div><div class="section-body">';
  html += '<div class="callout info"><strong>What this section shows:</strong> Each question\'s score distribution before the program (pre-pool), and — for moms with both tests — how scores moved between pre and post. Use this to identify which specific questions are helping or hurting the KPI, and to inform future assessment revisions.</div>';
  html += '<div class="callout"><strong>Two data pools:</strong> <em>Pre-pool</em> = all moms who took a pre-test in this window (larger group, shows baseline). <em>Paired cohort</em> = '+(counts.with_pair||0)+' moms with both pre and post (smaller group, shows actual movement).'+((counts.with_pair||0)<5?' <span class="warn-badge">Very small — treat as directional only.</span>':'')+'</div>';
  ['EP','RR'].forEach(function(track){
    var qs=questions.filter(function(q){return q.track_group===track&&q.template_type==='pre';});
    if(!qs.length){html+='<div class="subsection">'+track+' - No questions</div>';return;}
    var hc=qs.filter(function(q){return q.answered>0&&q.at_ceiling/q.answered>0.4;});
    html += '<div class="subsection">'+track+' Items</div>';
    html += hc.length>0?'<div class="callout alert">'+hc.length+' item(s) with ceiling rate above 40% in the pre-pool. These cannot show improvement for moms already at the maximum.</div>':'<div class="callout info">No items with ceiling rate above 40% in the '+track+' pre-pool.</div>';
    html += '<div class="tbl-wrap"><table><thead><tr><th>Domain</th><th style="min-width:160px">Question</th><th>Pre n</th><th>Mean</th><th>Floor%</th><th>Ceiling%</th><th>Dist</th><th>Paired n</th><th>Pre M</th><th>Post M</th><th>Delta</th><th>%Incr</th><th>%Decr</th></tr></thead><tbody>';
    qs.forEach(function(q){
      var mv=itemMovement[q.question_id]||null;
      var preMean=mv?pf(mv.pre_sum/mv.n):null,postMean=mv?pf(mv.post_sum/mv.n):null;
      var delta=(preMean!=null&&postMean!=null)?pf(postMean-preMean):null;
      var pctIncr=mv?Math.round(100*mv.increased/mv.n):null,pctDecr=mv?Math.round(100*mv.decreased/mv.n):null;
      var ceilPct=q.answered>0?Math.round(100*q.at_ceiling/q.answered):null;
      var floorPct=q.answered>0?Math.round(100*q.at_floor/q.answered):null;
      var dist=[q.resp_1,q.resp_2,q.resp_3,q.resp_4,q.resp_5].map(function(v){return v!=null?v:0;}).join('-');
      var lbl=(q.question_label||'').substring(0,80)+((q.question_label||'').length>80?'...':'');
      html += '<tr><td style="font-size:11px;">'+esc(q.construct_name||'No Domain')+'</td>'
        +'<td style="white-space:normal;font-size:11px;max-width:200px;">'+esc(lbl)+'</td>'
        +'<td>'+(q.answered||0)+'</td>'
        +'<td>'+(q.obs_mean!=null?pf(q.obs_mean):'n/a')+'</td>'
        +'<td>'+(floorPct!=null?floorPct+'%':'n/a')+'</td>'
        +'<td class="'+(ceilPct>40?'flag-text':'')+'">'+(ceilPct!=null?ceilPct+'%':'n/a')+'</td>'
        +'<td style="font-family:monospace;font-size:11px;">'+dist+'</td>'
        +'<td>'+(mv?mv.n:'n/a')+'</td>'
        +'<td>'+(preMean!=null?preMean:'n/a')+'</td>'
        +'<td>'+(postMean!=null?postMean:'n/a')+'</td>'
        +'<td class="'+(delta!=null&&delta>0?'ok':delta!=null&&delta<0?'ambig':'')+'">'+(delta!=null?delta:'n/a')+'</td>'
        +'<td>'+(pctIncr!=null?pctIncr+'%':'n/a')+'</td>'
        +'<td class="'+(pctDecr!=null&&pctDecr>50?'ambig':'')+'">'+(pctDecr!=null?pctDecr+'%':'n/a')+'</td></tr>';
    });
    html += '</tbody></table></div>';
  });
  html += '<div class="footnote">Apparent regression (post &lt; pre) is ambiguous, not proof of no learning. A mom who internalizes the curriculum may score herself more honestly. Admin access only.</div>';
  html += '</div></div>';

  // ── Phase 0 (moved to end — technical verification) ──
  html += '<div class="section"><div class="section-head"><span class="section-eyebrow">Detail C &nbsp;·&nbsp; Verification</span><span class="section-title">Scoring Code Baseline</span></div><div class="section-body">';
  html += '<div class="callout info"><strong>What this section does:</strong> Confirms the three scoring methods produce expected numbers using a known reference case (Teisha Shepherd). This is a technical sanity check — not a finding to act on.</div>';
  html += '<div class="callout"><strong>KPI 3 today (report-data.js):</strong> Flat total (Method C). The Trellis Track Journey view uses Method A (domain-weighted). These can give a different result for the same mom.</div>';
  if(teishaRows.length>0){
    html += '<div class="subsection">Teisha Shepherd RR Pre Validation (Target: 3.8)</div><div class="tbl-wrap"><table><thead><tr><th>Type</th><th>Date</th><th>Answered</th><th>Flat Avg (B)</th><th>Domain Mean of Means (A)</th></tr></thead><tbody>';
    teishaRows.forEach(function(r){
      var domMean = teishaDomains.length>0&&r.atype==='pre'?pf(teishaDomains.reduce(function(s,dd){return s+parseFloat(dd.domain_mean);},0)/teishaDomains.length):'-';
      html += '<tr><td>'+esc(r.atype)+'</td><td>'+esc(String(r.ar_date||'').substring(0,10))+'</td><td>'+(r.answered||0)+'</td><td>'+pf(r.avg_score)+'</td><td>'+domMean+'</td></tr>';
    });
    html += '</tbody></table></div>';
    if(teishaDomains.length>0){
      var dm=pf(teishaDomains.reduce(function(s,dd){return s+parseFloat(dd.domain_mean);},0)/teishaDomains.length);
      html += '<div class="callout '+(Math.abs(parseFloat(dm)-3.8)<0.05?'info':'alert')+'">Domain mean of means = <strong>'+dm+'</strong>. '+(Math.abs(parseFloat(dm)-3.8)<0.05?'Reproduces 3.8 correctly.':'Does not reproduce 3.8 exactly — investigate before relying on Method A scores.')+'</div>';
    }
  } else {
    html += '<div class="callout">Teisha Shepherd not found in current data window.</div>';
  }
  html += '</div></div>';

  return html;
}
</script>
</body>
</html>
