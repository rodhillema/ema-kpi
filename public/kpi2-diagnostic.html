<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="/favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPI 2 Family Wellness Diagnostic · ĒMA Impact Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shrikhand&family=Oswald:wght@300;400;600&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/leftnav.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#ec482f;--red-dk:#c23018;--red-lt:#fef0ed;
  --green:#123939;--green-lt:#ecefe1;
  --yellow:#f2a136;--yellow-lt:#fff3dc;
  --warn-lt:#fff8ee;
  --dark:#2C2C2C;--mid:#5A5A5A;--light:#999;
  --border:#E0E0E0;--bg:#fdf7f3;--white:#fff;
}
html{font-size:14px}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}

/* ── LOGIN ── */
.login-view{display:none;flex-direction:column;min-height:100vh;align-items:center;justify-content:center;padding:40px 16px;background:var(--bg)}
body.show-login .login-view{display:flex}
body.logged-in .login-view{display:none!important}
.login-box{width:100%;max-width:360px;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:40px 36px 36px;box-shadow:0 4px 24px rgba(0,0,0,.07)}
.login-title{font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;color:var(--dark);text-align:center;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--mid);text-align:center;margin-bottom:28px;line-height:1.5}
.login-err{background:var(--red-lt);border:1px solid rgba(236,72,47,.2);border-left:3px solid var(--red);border-radius:6px;padding:9px 12px;font-size:12px;color:var(--red-dk);margin-bottom:18px;display:none}
.login-err.show{display:block}
.field{margin-bottom:14px}
.field label{display:block;font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--mid);margin-bottom:5px}
.field input{width:100%;font-family:'Lato',sans-serif;font-size:14px;padding:10px 12px;border:1px solid var(--border);border-radius:7px;background:var(--white);color:var(--dark);outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--green)}
.login-btn{width:100%;background:var(--red);color:var(--white);border:none;border-radius:7px;padding:12px 0;font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;margin-top:6px;transition:background .15s}
.login-btn:hover{background:var(--red-dk)}

/* ── PORTAL ── */
.portal-view{display:none;flex-direction:column;min-height:100vh}
body.logged-in .portal-view{display:flex}

/* ── NAV ── */
.nav{background:var(--red);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 36px;position:sticky;top:0;z-index:300;box-shadow:0 1px 8px rgba(0,0,0,.18);flex-shrink:0}
.nav-left{display:flex;align-items:center;gap:14px}
.nav-logo{height:30px;width:auto;display:block}
.nav-hub{font-family:'Oswald',sans-serif;font-size:12px;color:rgba(255,255,255,.8);text-transform:uppercase;letter-spacing:1.5px;padding-left:14px;border-left:1px solid rgba(255,255,255,.3)}
.nav-hub a{color:rgba(255,255,255,.8);text-decoration:none}
.nav-hub a:hover{color:var(--white)}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-sep{width:1px;height:20px;background:rgba(255,255,255,.25)}
.nav-scope{display:flex;flex-direction:column;gap:1px;font-family:'Oswald',sans-serif;color:rgba(255,255,255,.95);padding:0 4px}
.nav-scope-lbl{font-size:9px;font-weight:300;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.55)}
.nav-scope-val{font-size:12px;font-weight:600}
.nav-user{display:flex;align-items:center;gap:10px}
.nav-avatar{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;color:var(--white)}
.nav-name{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;color:var(--white)}
.nav-role{font-family:'Oswald',sans-serif;font-size:11px;font-weight:300;color:rgba(255,255,255,.7);letter-spacing:.5px;text-transform:uppercase}
.nav-signout{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:rgba(255,255,255,.7);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:4px;transition:all .15s}
.nav-signout:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.95)}
.nav-link{font-family:'Oswald',sans-serif;font-size:12px;font-weight:400;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.85);text-decoration:none;padding:6px 13px;border:1px solid rgba(255,255,255,.35);border-radius:5px;transition:all .15s}
.nav-link:hover{color:var(--white);border-color:rgba(255,255,255,.6)}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden;position:relative}
.main{flex:1;overflow-y:auto;overflow-x:clip;padding:0 0 40px;min-width:0}

/* ── REPORT HEADER ── */
.report-hdr{background:var(--bg);border-bottom:2px solid var(--red);padding:14px 28px;display:flex;align-items:baseline;gap:14px}
.rh-eyebrow{font-family:'Oswald',sans-serif;font-size:10px;font-weight:300;text-transform:uppercase;letter-spacing:2px;color:var(--mid)}
.rh-title{font-family:'Shrikhand',cursive;font-size:20px;color:var(--dark)}

/* ── CONTENT ── */
.content{padding:24px 28px}

/* ── Loading / error ── */
.state-msg{text-align:center;padding:60px 20px;font-family:'Oswald',sans-serif;font-size:13px;font-weight:300;letter-spacing:1px;text-transform:uppercase;color:var(--light)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{background:var(--red-lt);border-left:3px solid var(--red);border-radius:4px;padding:12px 16px;font-size:13px;color:var(--red-dk)}

/* ── Section cards ── */
.section{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px}
.section-head{padding:11px 18px 9px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:10px}
.section-eyebrow{font-family:'Oswald',sans-serif;font-size:10px;font-weight:300;text-transform:uppercase;letter-spacing:2px;color:var(--mid);flex-shrink:0}
.section-title{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--green)}
.section-body{padding:13px 18px}
.subsection{font-family:'Oswald',sans-serif;font-size:11px;font-weight:400;text-transform:uppercase;letter-spacing:.8px;color:var(--green);border-top:1px solid var(--green-lt);padding-top:9px;margin:13px 0 7px}

/* ── KPI grid ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin:10px 0}
.kpi-card{background:var(--green-lt);border-radius:6px;padding:10px 12px;text-align:center}
.kpi-card .knum{font-family:'Shrikhand',cursive;font-size:1.9rem;color:var(--green)}
.kpi-card .klbl{font-family:'Oswald',sans-serif;font-size:10px;font-weight:300;text-transform:uppercase;color:var(--mid);letter-spacing:.06em;margin-top:2px}
.kpi-card.kred{background:var(--red-lt)}.kpi-card.kred .knum{color:var(--red)}
.kpi-card.kywarn{background:var(--yellow-lt)}.kpi-card.kywarn .knum{color:var(--yellow)}

/* ── Callouts ── */
.callout{border-left:4px solid var(--yellow);background:var(--warn-lt);padding:8px 12px;border-radius:0 4px 4px 0;margin:7px 0;font-size:12px;line-height:1.5}
.callout.alert{border-left-color:var(--red);background:var(--red-lt)}
.callout.info{border-left-color:var(--green);background:var(--green-lt)}
.callout strong{display:block;margin-bottom:2px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.04em;font-size:11px}

/* ── Tables ── */
.tbl-wrap{overflow-x:auto;margin:6px 0 10px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
table th{background:var(--green);color:var(--white);text-align:left;padding:6px 9px;font-family:'Oswald',sans-serif;font-weight:400;text-transform:uppercase;letter-spacing:.05em;font-size:11px;white-space:nowrap}
table th.sortable{cursor:pointer;user-select:none}
table th.sortable:hover{background:#1d5050}
table th.sort-asc::after{content:' ▲';font-size:9px;opacity:.85}
table th.sort-desc::after{content:' ▼';font-size:9px;opacity:.85}
table td{padding:5px 9px;border-bottom:1px solid var(--border);vertical-align:top}
tr:nth-child(even) td{background:var(--bg)}
tr:hover td{background:var(--red-lt)}
tr.hidden-row{display:none}
/* filter input */
.tbl-filter{display:flex;align-items:center;gap:8px;margin:8px 0 4px}
.tbl-filter input{font-family:'Lato',sans-serif;font-size:12px;padding:5px 10px;border:1px solid var(--border);border-radius:5px;outline:none;min-width:220px;background:var(--white);color:var(--dark)}
.tbl-filter input:focus{border-color:var(--green)}
.tbl-filter label{font-family:'Oswald',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--mid)}
.tbl-filter .filter-count{font-family:'Oswald',sans-serif;font-size:10px;color:var(--light);letter-spacing:.04em}

/* ── Tags/badges ── */
.tag{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:700;margin:0 1px}
.tag-flip{background:var(--red);color:var(--white)}
.tag-same{background:#e0e0e0;color:#555}
.tag-ok{background:var(--green);color:var(--white)}
.warn-badge{background:var(--yellow);color:var(--dark);padding:1px 6px;border-radius:3px;font-size:11px;font-weight:700}
.ok{color:#1a6a1a;font-weight:700}
.ambig{color:#6a4a00;font-style:italic}
.flag-text{color:var(--red);font-weight:700}
.footnote{font-size:11px;color:var(--mid);margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-view">
  <div class="login-box">
    <div class="login-title">ĒMA Impact Hub</div>
    <div class="login-sub">Sign in with your ĒMA account</div>
    <div class="login-err" id="login-err">Incorrect username or password.</div>
    <div class="field"><label>Username</label><input type="text" id="lu" autocomplete="username" placeholder="your.name"></div>
    <div class="field"><label>Password</label><input type="password" id="lp" autocomplete="current-password" placeholder="••••••••"></div>
    <button class="login-btn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- PORTAL -->
<div class="portal-view">

  <nav class="nav">
    <div class="nav-left">
      <a href="/"><img class="nav-logo" src="/email-logo.png" alt="EMA"></a>
      <div class="nav-hub"><a href="/">Impact Hub</a></div>
    </div>
    <div class="nav-right">
      <div class="nav-scope">
        <div class="nav-scope-lbl">Viewing</div>
        <div class="nav-scope-val">All Affiliates</div>
      </div>
      <div class="nav-sep"></div>
      <div class="nav-user">
        <div class="nav-avatar" id="nav-avatar"></div>
        <div>
          <div class="nav-name" id="nav-name"></div>
          <div class="nav-role" id="nav-role"></div>
        </div>
      </div>
      <div class="nav-sep"></div>
      <button class="nav-signout" onclick="doSignOut()">Sign Out</button>
      <a class="nav-link" href="https://trellisplatform.com" target="_blank" rel="noopener">Go to Trellis &rarr;</a>
    </div>
  </nav>

  <div class="layout">
    <div class="main">

      <div class="report-hdr">
        <span class="rh-eyebrow">HQ Resources &middot; KPI Diagnostic</span>
        <span class="rh-title">KPI 2 Family Wellness Diagnostic</span>
      </div>

      <div class="content">
        <div id="state" class="state-msg"><div class="spinner"></div>Loading diagnostic data&hellip;</div>
        <div id="report" style="display:none"></div>
      </div>

    </div>
  </div>

</div><!-- /portal-view -->

<script defer src="/js/leftnav.js"></script>
<script>
'use strict';

// ── AUTH ─────────────────────────────────────────────────────
async function doLogin() {
  var u = document.getElementById('lu').value.trim().toLowerCase();
  var p = document.getElementById('lp').value;
  var err = document.getElementById('login-err');
  err.classList.remove('show');
  try {
    var r = await fetch('/api/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p})});
    if (!r.ok) { err.classList.add('show'); return; }
    var mr = await fetch('/api/me');
    if (mr.ok) { var md = await mr.json(); if (md.user) { applySession(md.user); return; } }
    err.classList.add('show');
  } catch(e) { err.classList.add('show'); }
}

async function doSignOut() {
  try { await fetch('/api/logout', {method:'POST'}); } catch(e) {}
  window.location.href = '/';
}

function applySession(u) {
  if (u.role !== 'administrator') { window.location.href = '/'; return; }
  document.body.classList.remove('show-login');
  document.body.classList.add('logged-in');
  var first = u.firstName || '', last = u.lastName || '';
  document.getElementById('nav-avatar').textContent = ((first[0]||'')+(last[0]||'')).toUpperCase();
  document.getElementById('nav-name').textContent = (first+' '+last).trim();
  document.getElementById('nav-role').textContent = 'HQ Admin';
  loadDiagnostic();
}

(async function init() {
  try {
    var r = await fetch('/api/me');
    if (r.ok) { var d = await r.json(); if (d.user) { applySession(d.user); return; } }
  } catch(e) {}
  document.body.classList.add('show-login');
})();

// ── HELPERS ──────────────────────────────────────────────────
function pf(v,d){ d=d||2; return v==null?null:parseFloat(parseFloat(v).toFixed(d)); }
function esc(s){ return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function rateCell(num,den){ if(!den) return '<em style="color:#aaa">no data</em>'; var pct=Math.round(1000*num/den)/10; return num+'/'+den+' ('+pct+'%)'+(den<10?' <span class="warn-badge">small-n</span>':''); }
function smallN(n){ return n<10?' <span class="warn-badge">n='+n+' caution</span>':''; }
function pct(n,d){ return d ? Math.round(100*n/d)+'%' : 'n/a'; }
function nCell(v){ return v > 0 ? '<span class="flag-text">'+v+'</span>' : '<span style="color:#aaa">0</span>'; }

var DOMAIN_ORDER = ['ats','cc','edu','ei','fin','home','naa','res','soc','trnprt','well'];

// ── FETCH ────────────────────────────────────────────────────
async function loadDiagnostic() {
  try {
    var r = await fetch('/api/kpi2-diagnostic');
    if (!r.ok) {
      var body = {};
      try { body = await r.json(); } catch(e) {}
      throw new Error((body.error||r.statusText)+(body.detail?' | '+body.detail:'')+(body.hint?' | Hint: '+body.hint:''));
    }
    var data = await r.json();
    document.getElementById('state').style.display = 'none';
    var el = document.getElementById('report');
    el.innerHTML = render(data);
    el.style.display = '';
    wireInteractivity();
  } catch(e) {
    document.getElementById('state').innerHTML = '<div class="err-box">Failed to load: '+esc(e.message)+'</div>';
  }
}

// ── SORT / FILTER ─────────────────────────────────────────────
function makeSortable(tableId) {
  var tbl = document.getElementById(tableId);
  if (!tbl) return;
  var ths = tbl.querySelectorAll('thead th');
  ths.forEach(function(th, ci) {
    th.classList.add('sortable');
    th.addEventListener('click', function() {
      var asc = th.classList.contains('sort-asc');
      ths.forEach(function(h){ h.classList.remove('sort-asc','sort-desc'); });
      th.classList.add(asc ? 'sort-desc' : 'sort-asc');
      var tbody = tbl.querySelector('tbody');
      var rows  = Array.from(tbody.querySelectorAll('tr'));
      rows.sort(function(a,b){
        var av = a.cells[ci] ? a.cells[ci].textContent.trim() : '';
        var bv = b.cells[ci] ? b.cells[ci].textContent.trim() : '';
        var an = parseFloat(av.replace(/[^0-9.\-]/g,'')), bn = parseFloat(bv.replace(/[^0-9.\-]/g,''));
        var cmp = (!isNaN(an) && !isNaN(bn)) ? (an - bn) : av.localeCompare(bv);
        return asc ? -cmp : cmp;
      });
      rows.forEach(function(r){ tbody.appendChild(r); });
    });
  });
}

function makeFilterable(inputId, tableId, countId) {
  var inp = document.getElementById(inputId);
  var tbl = document.getElementById(tableId);
  var ctr = countId ? document.getElementById(countId) : null;
  if (!inp || !tbl) return;
  inp.addEventListener('input', function() {
    var q = inp.value.trim().toLowerCase();
    var rows = tbl.querySelectorAll('tbody tr');
    var shown = 0;
    rows.forEach(function(r) {
      var match = !q || r.textContent.toLowerCase().indexOf(q) !== -1;
      r.classList.toggle('hidden-row', !match);
      if (match) shown++;
    });
    if (ctr) ctr.textContent = shown + ' of ' + rows.length + ' shown';
  });
}

// ── RENDER ───────────────────────────────────────────────────
function render(d) {
  var meta       = d.meta || {};
  var counts     = d.counts || {};
  var reconcile  = d.kpiReconciliation || {};
  var affRows    = d.affiliateFunnel || [];
  var paired     = d.pairedRows || [];
  var domStats   = d.domainStats || {};
  var distBD     = d.distByDomain || {};
  var domLabels  = meta.domain_labels || {};

  var genDate = new Date(meta.generated).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

  // ── Flags for findings summary ──
  var intakeN  = counts.has_intake_fwa_n || 0;
  var sixmoN   = counts.has_sixmo_fwa_n  || 0;
  var captureRate = intakeN ? sixmoN / intakeN : 0;
  var f1flag = intakeN === 0 || captureRate < 0.5;

  var ceilingDomains  = DOMAIN_ORDER.filter(function(d){ var dr=distBD[d]; return dr && dr.n>0 && dr.ceil_pct > 40; });
  var stagnantDomains = DOMAIN_ORDER.filter(function(d){ var ds=domStats[d]; return ds && ds.n>=3 && ds.up/ds.n < 0.2; });
  var f2flag = ceilingDomains.length > 0 || stagnantDomains.length > 0;

  var html = '';

  // ── Overview ──
  html += '<div style="background:var(--white);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:14px">'
    +'<div style="font-family:\'Oswald\',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--green);margin-bottom:8px">What this report does</div>'
    +'<p style="font-size:13px;line-height:1.6;color:var(--dark);margin-bottom:8px">KPI 2 measures financial and family wellness progress. A mom "counts" as improved if her Family Stability Score (FSS) — the sum of all 11 FWA domain scores — is higher on her 6-month assessment than on her intake assessment, where the 6-month window is 91–180 days after her intake date. This report investigates two possible reasons KPI 2 is low.</p>'
    +'<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;font-size:12px">'
    +'<div style="background:var(--red-lt);border-radius:6px;padding:9px 11px"><strong style="font-family:\'Oswald\',sans-serif;color:var(--red);display:block;margin-bottom:3px">① Data Capture</strong>How many eligible moms have both an Intake FWA and a 6-Month FWA on file within the 91–180 day window? Where are the gaps, and why?</div>'
    +'<div style="background:var(--green-lt);border-radius:6px;padding:9px 11px"><strong style="font-family:\'Oswald\',sans-serif;color:var(--green);display:block;margin-bottom:3px">② Assessment Design</strong>Are intake scores already high (ceiling effects)? Are some domains consistently stagnant — showing little movement between intake and 6 months?</div>'
    +'</div>'
    +'<div style="font-size:11px;color:var(--light);margin-top:10px">Window: '+esc(meta.data_start)+' – '+esc(meta.data_end)+' &nbsp;·&nbsp; Organic cohort only (PS-migrated moms excluded) &nbsp;·&nbsp; Generated '+genDate+'</div>'
    +'</div>';

  // ── KPI Alignment / Reconciliation ──
  var mainElig     = reconcile.main_eligible_n || 0;
  var mainImproved = reconcile.main_improved_n || 0;
  var mainPct      = mainElig ? Math.round(100 * mainImproved / mainElig) : null;
  var diagPaired   = reconcile.diagnostic_paired_n || counts.paired_n || 0;
  var diagImproved = reconcile.diagnostic_improved_n || counts.fss_improved_n || 0;
  var diagPct      = diagPaired ? Math.round(100 * diagImproved / diagPaired) : null;
  var inBoth       = reconcile.in_both_n || 0;
  var mainOnly     = reconcile.main_only_n || 0;
  var diagOnly     = reconcile.diag_only_n || 0;
  var mainOnlyRows = reconcile.mainOnlyRows || [];
  var diagOnlyRows = reconcile.diagOnlyRows || [];
  var methodsAgree = mainElig > 0 && diagPaired > 0 && Math.abs((mainPct||0)-(diagPct||0)) <= 5;

  html += '<div class="section"><div class="section-head"><span class="section-eyebrow">KPI Tile ↔ Diagnostic</span><span class="section-title">How the Hub KPI Number Relates to This Report</span></div><div class="section-body">';
  html += '<div class="callout info"><strong>Two different measurement methods</strong>The Hub KPI tile and this diagnostic use different anchors and windows for "pre" vs. "post." This section shows exactly how the counts compare — and which moms appear in one method but not the other.</div>';

  // Method comparison grid
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0">';
  // Main KPI tile method
  html += '<div style="border:2px solid var(--green);border-radius:8px;padding:12px 14px">'

    html += '<div class="subsection">Intake Score Stats by Domain (All Intake FWA Pool)</div>';
    html += '<div class="tbl-wrap"><table><thead><tr>'
      +'<th>Domain</th><th>Full Name</th><th>Intake pool (n)</th><th>Min</th><th>Mean</th><th>Median</th><th>Max</th><th>Std Dev</th><th>At Observed Max</th><th>Ceiling %</th><th>Flag</th>'
      +'</tr></thead><tbody>';
    DOMAIN_ORDER.forEach(function(d) {
      var dr = distBD[d];
      if (!dr) return;
      var ceilPct = dr.ceil_pct || 0;
      var flag = ceilPct > 40 ? '<span class="flag-text">⚠ ceiling &gt;40%</span>' : ceilPct > 25 ? '<span class="ambig">watch</span>' : '<span class="ok">ok</span>';
      html += '<tr>'
        +'<td style="font-family:monospace;font-size:11px">'+esc(d)+'</td>'
        +'<td style="font-size:11px">'+esc(domLabels[d]||d)+'</td>'
        +'<td>'+dr.n+'</td>'
        +'<td>'+pf(dr.mn)+'</td>'
        +'<td>'+pf(dr.mean)+'</td>'
        +'<td>'+pf(dr.median)+'</td>'
        +'<td>'+pf(dr.mx)+'</td>'
        +'<td>'+pf(dr.stddev)+'</td>'
        +'<td>'+dr.at_max_n+'</td>'
        +'<td class="'+(ceilPct>40?'flag-text':ceilPct>25?'ambig':'')+'">'+ceilPct+'%</td>'
        +'<td>'+flag+'</td>'
        +'</tr>';
    });
    html += '</tbody></table></div>';

    if (ceilingDomains.length) {
      html += '<div class="callout alert"><strong>Ceiling domains (&gt;40%): </strong>'+ceilingDomains.map(function(d){return esc(domLabels[d]||d)+' ('+esc(d)+')';}).join(', ')+'. More than 40% of moms who take the Intake FWA already score at the observed maximum for these domains. They cannot improve their score on the 6-Month FWA no matter what changes in real life — the assessment cannot detect improvement at the top end of the range.</div>';
    }

    // Stagnant domains from paired cohort
    if (counts.paired_n >= 3 && stagnantDomains.length) {
      html += '<div class="callout"><strong>Stagnant domains in paired cohort (&lt;20% improvement rate): </strong>'+stagnantDomains.map(function(d){var ds=domStats[d]; return esc(domLabels[d]||d)+' ('+pct(ds.up, ds.n)+')';}).join(', ')+'. These domains rarely show improvement between intake and 6 months. This could reflect real stability in moms at enrollment, ceiling effects, or domains that take longer than 180 days to shift.</div>';
    } else if (counts.paired_n > 0 && counts.paired_n < 3) {
      html += '<div class="callout"><strong>Paired cohort too small for stagnation analysis</strong> — need at least 3 paired moms. Currently '+counts.paired_n+'.</div>';
    }

    // Domain improvement rates from paired cohort
    if (counts.paired_n > 0) {
      html += '<div class="subsection">Domain Improvement Rates (Paired Cohort — Intake vs. 6-Month)</div>';
      html += '<div class="callout"><strong>Paired cohort: '+counts.paired_n+' moms</strong> who have both an Intake FWA and a 6-Month FWA in window.'+(counts.paired_n<10?' <span class="warn-badge">Small sample — treat as directional only.</span>':'')+'</div>';
      html += '<div class="tbl-wrap"><table><thead><tr><th>Domain</th><th>Full Name</th><th>n</th><th>Intake Mean</th><th>6-Mo Mean</th><th>Delta</th><th>% Improved</th><th>% Same</th><th>% Declined</th></tr></thead><tbody>';
      DOMAIN_ORDER.forEach(function(d) {
        var ds = domStats[d] || {};
        var n = ds.n || 0;
        var upPct   = n ? Math.round(100 * (ds.up||0)  / n) : null;
        var samePct = n ? Math.round(100 * (ds.same||0) / n) : null;
        var dnPct   = n ? Math.round(100 * (ds.down||0) / n) : null;
        var delta   = ds.preMean != null && ds.postMean != null ? pf(ds.postMean - ds.preMean) : null;
        html += '<tr>'
          +'<td style="font-family:monospace;font-size:11px">'+esc(d)+'</td>'
          +'<td style="font-size:11px">'+esc(domLabels[d]||d)+'</td>'
          +'<td>'+n+'</td>'
          +'<td>'+(ds.preMean!=null?pf(ds.preMean):'n/a')+'</td>'
          +'<td>'+(ds.postMean!=null?pf(ds.postMean):'n/a')+'</td>'
          +'<td class="'+(delta!=null&&delta>0?'ok':delta!=null&&delta<0?'ambig':'')+'">'+(delta!=null?delta:'n/a')+'</td>'
          +'<td class="'+(upPct!=null&&upPct<20?'flag-text':upPct!=null&&upPct>=50?'ok':'')+'">'+(upPct!=null?upPct+'%':'n/a')+'</td>'
          +'<td>'+(samePct!=null?samePct+'%':'n/a')+'</td>'
          +'<td class="'+(dnPct!=null&&dnPct>50?'ambig':'')+'">'+(dnPct!=null?dnPct+'%':'n/a')+'</td>'
          +'</tr>';
      });
      html += '</tbody></table></div>';
    }

    // FSS composite summary from paired cohort
    if (paired.length >= 3) {
      var intakeScores = paired.map(function(r){ return r.intake_fss; }).sort(function(a,b){return a-b;});
      var sixmoScores  = paired.map(function(r){ return r.sixmo_fss;  }).sort(function(a,b){return a-b;});
      var intakeMean = pf(intakeScores.reduce(function(s,v){return s+v;},0)/intakeScores.length);
      var sixmoMean  = pf(sixmoScores.reduce(function(s,v){return s+v;},0)/sixmoScores.length);
      var intakeMax  = intakeScores[intakeScores.length-1];
      html += '<div class="subsection">FSS Composite Distribution (Paired Cohort, n='+paired.length+')</div>';
      html += '<div class="tbl-wrap"><table><thead><tr><th>Metric</th><th>Intake FSS</th><th>6-Month FSS</th></tr></thead><tbody>';
      html += '<tr><td>Mean</td><td>'+intakeMean+'</td><td>'+sixmoMean+'</td></tr>';
      html += '<tr><td>Min observed</td><td>'+pf(intakeScores[0])+'</td><td>'+pf(sixmoScores[0])+'</td></tr>';
      html += '<tr><td>Max observed</td><td>'+pf(intakeMax)+'</td><td>'+pf(sixmoScores[sixmoScores.length-1])+'</td></tr>';
      html += '<tr><td>FSS improved (composite up)</td><td colspan="2">'+counts.fss_improved_n+' of '+paired.length+' ('+pct(counts.fss_improved_n, paired.length)+')</td></tr>';
      html += '</tbody></table></div>';
    }

    // Per-mom table (collapsible, sortable, filterable)
    if (paired.length) {
      var linkSentCount = paired.filter(function(r){ return r.intake_link_sent || r.sixmo_link_sent; }).length;
      html += '<details id="paired-detail" style="margin:10px 0" open>'
        +'<summary style="cursor:pointer;font-family:\'Oswald\',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--green);padding:6px 0;list-style:none;display:flex;align-items:center;gap:6px">'
        +'<svg viewBox="0 0 10 10" width="10" height="10" style="flex-shrink:0"><polyline points="2,3 5,7 8,3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>'
        +'Per-Mom Paired Detail &nbsp;<span style="font-weight:300;color:var(--mid)">'+paired.length+' moms with both Intake + 6-Month FWA'+(linkSentCount?' &nbsp;·&nbsp; '+linkSentCount+' sent via link':'')+'</span>'
        +'</summary>';

      html += '<div class="tbl-filter">'
        +'<label>Filter:</label>'
        +'<input type="text" id="paired-filter" placeholder="name, affiliate, yes/no…">'
        +'<span class="filter-count" id="paired-count"></span>'
        +'</div>';

      html += '<div class="tbl-wrap" style="margin-top:4px"><table id="paired-tbl"><thead><tr>'
        +'<th>Mom</th>'
        +'<th>Affiliate</th>'
        +'<th>Intake Date</th>'
        +'<th>Intake FWA<br><span style="font-size:9px;opacity:.7">via link?</span></th>'
        +'<th>6-Mo FWA<br><span style="font-size:9px;opacity:.7">via link?</span></th>'
        +'<th>Days Intake→6-Mo</th>'
        +'<th>Intake FSS</th>'
        +'<th>6-Month FSS</th>'
        +'<th>FSS Δ (Diagnostic)</th>'
        +'<th>Diag Improved?</th>'
        +'<th>Pairing Start</th>'
        +'<th>Hub Pre FSS</th>'
        +'<th>Hub Post FSS</th>'
        +'<th>Hub KPI Improved?</th>'
        +'<th>Methods Agree?</th>'
        +'<th>Domains Up (of 11)</th>'
        +'</tr></thead><tbody>';

      paired.forEach(function(r) {
        var agree = r.main_kpi_eligible
          ? (r.fss_improved === r.main_kpi_improved)
          : null;
        var intakeLink = r.intake_link_sent
          ? '<span style="background:var(--green);color:var(--white);padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700">link</span>'
          : '<span style="color:var(--light);font-size:10px">coord</span>';
        var sixmoLink = r.sixmo_link_sent
          ? '<span style="background:var(--green);color:var(--white);padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700">link</span>'
          : '<span style="color:var(--light);font-size:10px">coord</span>';

        html += '<tr>'
          +'<td>'+esc(r.first_name)+' '+esc(r.last_name)+(r.inversion?' <span class="warn-badge" title="temporal inversion">⚠</span>':'')+'</td>'
          +'<td style="font-size:11px">'+esc(r.affiliate||'')+'</td>'
          +'<td style="font-size:11px">'+(r.intake_date?String(r.intake_date).substring(0,10):'')+'</td>'
          +'<td>'+intakeLink+'</td>'
          +'<td>'+sixmoLink+'</td>'
          +'<td>'+r.days_between+'</td>'
          +'<td>'+pf(r.intake_fss)+'</td>'
          +'<td>'+pf(r.sixmo_fss)+'</td>'
          +'<td class="'+(r.fss_delta>0?'ok':r.fss_delta<0?'ambig':'')+'">'+pf(r.fss_delta)+'</td>'
          +'<td class="'+(r.fss_improved?'ok':'ambig')+'">'+(r.fss_improved?'yes':'no')+'</td>'
          +'<td style="font-size:11px">'+(r.pairing_start?String(r.pairing_start).substring(0,10):'<span style="color:#aaa">no pairing</span>')+'</td>'
          +'<td>'+(r.main_kpi_eligible?pf(r.main_pre_fss):'<span style="color:#aaa">—</span>')+'</td>'
          +'<td>'+(r.main_kpi_eligible?pf(r.main_post_fss):'<span style="color:#aaa">—</span>')+'</td>'
          +'<td class="'+(r.main_kpi_eligible?(r.main_kpi_improved?'ok':'ambig'):'')+'">'+(!r.main_kpi_eligible?'<span style="color:#aaa">not eligible</span>':(r.main_kpi_improved?'yes':'no'))+'</td>'
          +'<td class="'+(agree===true?'ok':agree===false?'flag-text':'')+'">'+( agree===null?'<span style="color:#aaa">n/a</span>':agree?'✓ yes':'✗ no')+'</td>'
          +'<td>'+r.domains_improved_count+' / 11</td>'
          +'</tr>';
      });
      html += '</tbody></table></div></details>';
    }
  }
  html += '<div class="footnote">FSS composite = sum of all 11 domain scores. "Via link" = <code>completed_ahead=true</code> — FWA was sent to the mom as a self-service link rather than completed with a coordinator. "Hub KPI" columns use pairing_start +30d/+60d anchor (report-data.js V6). Admin access only.</div>';
  html += '</div></div>';

  return html;
}

// Wire up sort/filter after render injects DOM
function wireInteractivity() {
  makeSortable('paired-tbl');
  makeFilterable('paired-filter', 'paired-tbl', 'paired-count');
  makeSortable('affiliate-tbl');
}
</script>
</body>
</html>
