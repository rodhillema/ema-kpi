<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="/favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPI 2 Family Wellness Diagnostic · ĒMA Impact Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shrikhand&family=Oswald:wght@300;400;600&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/leftnav.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#ec482f;--red-dk:#c23018;--red-lt:#fef0ed;
  --green:#123939;--green-lt:#ecefe1;
  --yellow:#f2a136;--yellow-lt:#fff3dc;
  --warn-lt:#fff8ee;
  --dark:#2C2C2C;--mid:#5A5A5A;--light:#999;
  --border:#E0E0E0;--bg:#fdf7f3;--white:#fff;
}
html{font-size:14px}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}

/* ── LOGIN ── */
.login-view{display:none;flex-direction:column;min-height:100vh;align-items:center;justify-content:center;padding:40px 16px;background:var(--bg)}
body.show-login .login-view{display:flex}
body.logged-in .login-view{display:none!important}
.login-box{width:100%;max-width:360px;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:40px 36px 36px;box-shadow:0 4px 24px rgba(0,0,0,.07)}
.login-title{font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;color:var(--dark);text-align:center;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--mid);text-align:center;margin-bottom:28px;line-height:1.5}
.login-err{background:var(--red-lt);border:1px solid rgba(236,72,47,.2);border-left:3px solid var(--red);border-radius:6px;padding:9px 12px;font-size:12px;color:var(--red-dk);margin-bottom:18px;display:none}
.login-err.show{display:block}
.field{margin-bottom:14px}
.field label{display:block;font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--mid);margin-bottom:5px}
.field input{width:100%;font-family:'Lato',sans-serif;font-size:14px;padding:10px 12px;border:1px solid var(--border);border-radius:7px;background:var(--white);color:var(--dark);outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--green)}
.login-btn{width:100%;background:var(--red);color:var(--white);border:none;border-radius:7px;padding:12px 0;font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;margin-top:6px;transition:background .15s}
.login-btn:hover{background:var(--red-dk)}

/* ── PORTAL ── */
.portal-view{display:none;flex-direction:column;min-height:100vh}
body.logged-in .portal-view{display:flex}

/* ── NAV ── */
.nav{background:var(--red);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 36px;position:sticky;top:0;z-index:300;box-shadow:0 1px 8px rgba(0,0,0,.18);flex-shrink:0}
.nav-left{display:flex;align-items:center;gap:14px}
.nav-logo{height:30px;width:auto;display:block}
.nav-hub{font-family:'Oswald',sans-serif;font-size:12px;color:rgba(255,255,255,.8);text-transform:uppercase;letter-spacing:1.5px;padding-left:14px;border-left:1px solid rgba(255,255,255,.3)}
.nav-hub a{color:rgba(255,255,255,.8);text-decoration:none}
.nav-hub a:hover{color:var(--white)}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-sep{width:1px;height:20px;background:rgba(255,255,255,.25)}
.nav-scope{display:flex;flex-direction:column;gap:1px;font-family:'Oswald',sans-serif;color:rgba(255,255,255,.95);padding:0 4px}
.nav-scope-lbl{font-size:9px;font-weight:300;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.55)}
.nav-scope-val{font-size:12px;font-weight:600}
.nav-user{display:flex;align-items:center;gap:10px}
.nav-avatar{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;color:var(--white)}
.nav-name{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;color:var(--white)}
.nav-role{font-family:'Oswald',sans-serif;font-size:11px;font-weight:300;color:rgba(255,255,255,.7);letter-spacing:.5px;text-transform:uppercase}
.nav-signout{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:rgba(255,255,255,.7);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:4px;transition:all .15s}
.nav-signout:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.95)}
.nav-link{font-family:'Oswald',sans-serif;font-size:12px;font-weight:400;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.85);text-decoration:none;padding:6px 13px;border:1px solid rgba(255,255,255,.35);border-radius:5px;transition:all .15s}
.nav-link:hover{color:var(--white);border-color:rgba(255,255,255,.6)}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden;position:relative}
.main{flex:1;overflow-y:auto;overflow-x:clip;padding:0 0 40px;min-width:0}

/* ── REPORT HEADER ── */
.report-hdr{background:var(--bg);border-bottom:2px solid var(--red);padding:14px 28px;display:flex;align-items:baseline;gap:14px}
.rh-eyebrow{font-family:'Oswald',sans-serif;font-size:10px;font-weight:300;text-transform:uppercase;letter-spacing:2px;color:var(--mid)}
.rh-title{font-family:'Shrikhand',cursive;font-size:20px;color:var(--dark)}

/* ── CONTENT ── */
.content{padding:24px 28px}

/* ── Loading / error ── */
.state-msg{text-align:center;padding:60px 20px;font-family:'Oswald',sans-serif;font-size:13px;font-weight:300;letter-spacing:1px;text-transform:uppercase;color:var(--light)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{background:var(--red-lt);border-left:3px solid var(--red);border-radius:4px;padding:12px 16px;font-size:13px;color:var(--red-dk)}

/* ── Scope note ── */
.scope-note{background:var(--green-lt);border-left:3px solid var(--green);padding:10px 14px;border-radius:0 4px 4px 0;font-size:12px;color:var(--mid);margin-bottom:18px;line-height:1.5}

/* ── Section cards ── */
.section{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px}
.section-head{padding:11px 18px 9px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:10px}
.section-eyebrow{font-family:'Oswald',sans-serif;font-size:10px;font-weight:300;text-transform:uppercase;letter-spacing:2px;color:var(--mid);flex-shrink:0}
.section-title{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--green)}
.section-body{padding:13px 18px}
.subsection{font-family:'Oswald',sans-serif;font-size:11px;font-weight:400;text-transform:uppercase;letter-spacing:.8px;color:var(--green);border-top:1px solid var(--green-lt);padding-top:9px;margin:13px 0 7px}

/* ── KPI grid ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin:10px 0}
.kpi-card{background:var(--green-lt);border-radius:6px;padding:10px 12px;text-align:center}
.kpi-card .knum{font-family:'Shrikhand',cursive;font-size:1.9rem;color:var(--green)}
.kpi-card .klbl{font-family:'Oswald',sans-serif;font-size:10px;font-weight:300;text-transform:uppercase;color:var(--mid);letter-spacing:.06em;margin-top:2px}
.kpi-card.kred{background:var(--red-lt)}.kpi-card.kred .knum{color:var(--red)}
.kpi-card.kywarn{background:var(--yellow-lt)}.kpi-card.kywarn .knum{color:var(--yellow)}

/* ── Callouts ── */
.callout{border-left:4px solid var(--yellow);background:var(--warn-lt);padding:8px 12px;border-radius:0 4px 4px 0;margin:7px 0;font-size:12px;line-height:1.5}
.callout.alert{border-left-color:var(--red);background:var(--red-lt)}
.callout.info{border-left-color:var(--green);background:var(--green-lt)}
.callout strong{display:block;margin-bottom:2px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.04em;font-size:11px}

/* ── Tables ── */
.tbl-wrap{overflow-x:auto;margin:6px 0 10px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
table th{background:var(--green);color:var(--white);text-align:left;padding:6px 9px;font-family:'Oswald',sans-serif;font-weight:400;text-transform:uppercase;letter-spacing:.05em;font-size:11px;white-space:nowrap}
table td{padding:5px 9px;border-bottom:1px solid var(--border);vertical-align:top}
tr:nth-child(even) td{background:var(--bg)}
tr:hover td{background:var(--red-lt)}

/* ── Tags/badges ── */
.tag{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:700;margin:0 1px}
.tag-flip{background:var(--red);color:var(--white)}
.tag-same{background:#e0e0e0;color:#555}
.tag-ok{background:var(--green);color:var(--white)}
.warn-badge{background:var(--yellow);color:var(--dark);padding:1px 6px;border-radius:3px;font-size:11px;font-weight:700}
.ok{color:#1a6a1a;font-weight:700}
.ambig{color:#6a4a00;font-style:italic}
.flag-text{color:var(--red);font-weight:700}
.footnote{font-size:11px;color:var(--mid);margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-view">
  <div class="login-box">
    <div class="login-title">ĒMA Impact Hub</div>
    <div class="login-sub">Sign in with your ĒMA account</div>
    <div class="login-err" id="login-err">Incorrect username or password.</div>
    <div class="field"><label>Username</label><input type="text" id="lu" autocomplete="username" placeholder="your.name"></div>
    <div class="field"><label>Password</label><input type="password" id="lp" autocomplete="current-password" placeholder="••••••••"></div>
    <button class="login-btn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- PORTAL -->
<div class="portal-view">

  <nav class="nav">
    <div class="nav-left">
      <a href="/"><img class="nav-logo" src="/email-logo.png" alt="EMA"></a>
      <div class="nav-hub"><a href="/">Impact Hub</a></div>
    </div>
    <div class="nav-right">
      <div class="nav-scope">
        <div class="nav-scope-lbl">Viewing</div>
        <div class="nav-scope-val">All Affiliates</div>
      </div>
      <div class="nav-sep"></div>
      <div class="nav-user">
        <div class="nav-avatar" id="nav-avatar"></div>
        <div>
          <div class="nav-name" id="nav-name"></div>
          <div class="nav-role" id="nav-role"></div>
        </div>
      </div>
      <div class="nav-sep"></div>
      <button class="nav-signout" onclick="doSignOut()">Sign Out</button>
      <a class="nav-link" href="https://trellisplatform.com" target="_blank" rel="noopener">Go to Trellis &rarr;</a>
    </div>
  </nav>

  <div class="layout">
    <div class="main">

      <div class="report-hdr">
        <span class="rh-eyebrow">HQ Resources &middot; KPI Diagnostic</span>
        <span class="rh-title">KPI 2 Family Wellness Diagnostic</span>
      </div>

      <div class="content">
        <div id="state" class="state-msg"><div class="spinner"></div>Loading diagnostic data&hellip;</div>
        <div id="report" style="display:none"></div>
      </div>

    </div>
  </div>

</div><!-- /portal-view -->

<script defer src="/js/leftnav.js"></script>
<script>
'use strict';

// ── AUTH ─────────────────────────────────────────────────────
async function doLogin() {
  var u = document.getElementById('lu').value.trim().toLowerCase();
  var p = document.getElementById('lp').value;
  var err = document.getElementById('login-err');
  err.classList.remove('show');
  try {
    var r = await fetch('/api/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p})});
    if (!r.ok) { err.classList.add('show'); return; }
    var mr = await fetch('/api/me');
    if (mr.ok) { var md = await mr.json(); if (md.user) { applySession(md.user); return; } }
    err.classList.add('show');
  } catch(e) { err.classList.add('show'); }
}

async function doSignOut() {
  try { await fetch('/api/logout', {method:'POST'}); } catch(e) {}
  window.location.href = '/';
}

function applySession(u) {
  if (u.role !== 'administrator') { window.location.href = '/'; return; }
  document.body.classList.remove('show-login');
  document.body.classList.add('logged-in');
  var first = u.firstName || '', last = u.lastName || '';
  document.getElementById('nav-avatar').textContent = ((first[0]||'')+(last[0]||'')).toUpperCase();
  document.getElementById('nav-name').textContent = (first+' '+last).trim();
  document.getElementById('nav-role').textContent = 'HQ Admin';
  loadDiagnostic();
}

(async function init() {
  try {
    var r = await fetch('/api/me');
    if (r.ok) { var d = await r.json(); if (d.user) { applySession(d.user); return; } }
  } catch(e) {}
  document.body.classList.add('show-login');
})();

// ── HELPERS ──────────────────────────────────────────────────
function pf(v,d){ d=d||2; return v==null?null:parseFloat(parseFloat(v).toFixed(d)); }
function esc(s){ return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function rateCell(num,den){ if(!den) return '<em style="color:#aaa">no data</em>'; var pct=Math.round(1000*num/den)/10; return num+'/'+den+' ('+pct+'%)'+(den<10?' <span class="warn-badge">small-n</span>':''); }
function smallN(n){ return n<10?' <span class="warn-badge">n='+n+' caution</span>':''; }
function pct(n,d){ return d ? Math.round(100*n/d)+'%' : 'n/a'; }

var DOMAIN_ORDER = ['ats','cc','edu','ei','fin','home','naa','res','soc','trnprt','well'];

// ── FETCH ────────────────────────────────────────────────────
async function loadDiagnostic() {
  try {
    var r = await fetch('/api/kpi2-diagnostic');
    if (!r.ok) {
      var body = {};
      try { body = await r.json(); } catch(e) {}
      throw new Error((body.error||r.statusText)+(body.detail?' | '+body.detail:'')+(body.hint?' | Hint: '+body.hint:''));
    }
    var data = await r.json();
    document.getElementById('state').style.display = 'none';
    var el = document.getElementById('report');
    el.innerHTML = render(data);
    el.style.display = '';
  } catch(e) {
    document.getElementById('state').innerHTML = '<div class="err-box">Failed to load: '+esc(e.message)+'</div>';
  }
}

// ── RENDER ───────────────────────────────────────────────────
function render(d) {
  var meta       = d.meta || {};
  var counts     = d.counts || {};
  var affRows    = d.affiliateFunnel || [];
  var paired     = d.pairedRows || [];
  var domStats   = d.domainStats || {};
  var distBD     = d.distByDomain || {};
  var domLabels  = meta.domain_labels || {};

  var genDate = new Date(meta.generated).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

  // ── Flags for findings summary ──
  var captureRate = counts.has_pre_n ? counts.has_post_in_window_n / counts.has_pre_n : 0;
  var f1flag = counts.has_pre_n === 0 || captureRate < 0.5;

  var f2flag = counts.flip_n > 0;

  var ceilingDomains = DOMAIN_ORDER.filter(function(d){ var dr=distBD[d]; return dr && dr.n>0 && dr.ceil_pct > 40; });
  var stagnantDomains = DOMAIN_ORDER.filter(function(d){ var ds=domStats[d]; return ds && ds.n>=3 && ds.up/ds.n < 0.2; });
  var f3flag = ceilingDomains.length > 0 || stagnantDomains.length > 0;

  var html = '';

  // ── Overview ──
  html += '<div style="background:var(--white);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:14px">'
    +'<div style="font-family:\'Oswald\',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--green);margin-bottom:8px">What this report does</div>'
    +'<p style="font-size:13px;line-height:1.6;color:var(--dark);margin-bottom:8px">KPI 2 measures financial and family wellness progress. A mom "counts" as improved if her Family Stability Score (FSS) — the sum of all 11 FWA domain scores — is higher on a post-assessment than on her pre-assessment, taken 91–180 days after her intake date. This report investigates <strong>three possible reasons KPI 2 is low</strong>.</p>'
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;font-size:12px">'
    +'<div style="background:var(--red-lt);border-radius:6px;padding:9px 11px"><strong style="font-family:\'Oswald\',sans-serif;color:var(--red);display:block;margin-bottom:3px">① Data Capture</strong>How many eligible moms have both a pre-FWA and a post-FWA on file within the 91–180 day window? Where are the gaps?</div>'
    +'<div style="background:var(--yellow-lt);border-radius:6px;padding:9px 11px"><strong style="font-family:\'Oswald\',sans-serif;color:#8a6000;display:block;margin-bottom:3px">② Scoring Method</strong>Does the FSS composite score agree with domain-level improvement? Would a mom count as improved under "any domain up" even if her composite went down?</div>'
    +'<div style="background:var(--green-lt);border-radius:6px;padding:9px 11px"><strong style="font-family:\'Oswald\',sans-serif;color:var(--green);display:block;margin-bottom:3px">③ Assessment Design</strong>Are pre-scores already high (ceiling effects)? Are some domains consistently stagnant across all moms?</div>'
    +'</div>'
    +'<div style="font-size:11px;color:var(--light);margin-top:10px">Window: '+esc(meta.data_start)+' – '+esc(meta.data_end)+' &nbsp;·&nbsp; Organic cohort only (PS-migrated moms excluded) &nbsp;·&nbsp; Generated '+genDate+'</div>'
    +'</div>';

  // ── Scoring method reference ──
  html += '<div style="background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 20px;margin-bottom:14px">'
    +'<div style="font-family:\'Oswald\',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--green);margin-bottom:10px">The two ways this report measures improvement</div>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px">'
    +'<div style="border-left:4px solid var(--red);padding:9px 12px;background:var(--red-lt);border-radius:0 6px 6px 0">'
    +'<div style="font-family:\'Oswald\',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--red-dk);margin-bottom:4px">Current KPI 2 &nbsp;·&nbsp; FSS Composite</div>'
    +'<div style="font-size:12px;line-height:1.6;color:var(--dark)">Sum all 11 domain scores pre and post. If the total went up by any amount, she counts as improved. <strong>This is how KPI 2 is calculated today.</strong> A domain that dropped can cancel out a domain that rose.</div>'
    +'</div>'
    +'<div style="border-left:4px solid var(--green);padding:9px 12px;background:var(--green-lt);border-radius:0 6px 6px 0">'
    +'<div style="font-family:\'Oswald\',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--green);margin-bottom:4px">Any domain improved</div>'
    +'<div style="font-size:12px;line-height:1.6;color:var(--dark)">A mom counts as improved if her score went up in <em>at least one</em> of the 11 domains — even if others stayed flat or dipped. Sets the most achievable bar.</div>'
    +'</div>'
    +'</div>'
    +'</div>';

  // ── Findings summary ──
  html += '<div style="background:var(--green);border-radius:10px;padding:18px 20px;margin-bottom:14px">'
    +'<div style="font-family:\'Oswald\',sans-serif;font-size:10px;font-weight:300;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.5);margin-bottom:4px">Findings Summary</div>'
    +'<div style="font-family:\'Oswald\',sans-serif;font-size:15px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--yellow);margin-bottom:14px">What Is Causing KPI 2 to Underperform?</div>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px">'

    // Finding 1
    +'<div style="background:rgba(255,255,255,.08);border-left:4px solid '+(f1flag?'var(--red)':'rgba(255,255,255,.2)')+';border-radius:0 6px 6px 0;padding:12px 14px">'
    +'<div style="font-family:\'Oswald\',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:'+(f1flag?'#ff9f8e':'rgba(255,255,255,.5)')+';margin-bottom:6px">① Data Capture</div>'
    +'<div style="font-size:13px;font-weight:700;color:var(--white);margin-bottom:6px">'
    +(f1flag ? 'YES — missing assessments are the primary problem.' : 'Capture rate is acceptable.')
    +'</div>'
    +'<div style="font-size:12px;color:rgba(255,255,255,.8);line-height:1.6;margin-bottom:8px">'
    +(counts.has_pre_n||0)+' moms have a pre-FWA. Of those, '+(counts.has_post_in_window_n||0)+' ('+pct(counts.has_post_in_window_n||0, counts.has_pre_n||1)+') have a post in the 91–180 day window. '
    +(f1flag ? 'The low rate is primarily a missing data problem.' : 'Most moms with a pre-FWA also have a qualifying post.')
    +'</div>'
    +'<div style="font-size:11px;background:rgba(255,255,255,.1);border-radius:4px;padding:7px 9px;color:rgba(255,255,255,.9)">'

  // ────────────────────────────────────────────────────────────────────────────

  // ────────────────────────────────────────────────────────────────────────────

  html += '<div class="section"><div class="section-head"><span class="section-eyebrow">Detail A &nbsp;·&nbsp; Finding ③</span><span class="section-title">Assessment Design — Pre-Score Distributions and Ceiling Effects</span></div><div class="section-body">';

  if (Object.keys(distBD).length === 0) {

      var preScores = paired.map(function(r){ return r.pre_fss; }).sort(function(a,b){return a-b;});
      var postScores = paired.map(function(r){ return r.post_fss; }).sort(function(a,b){return a-b;});
      var preMean = pf(preScores.reduce(function(s,v){return s+v;},0)/preScores.length);
      var postMean = pf(postScores.reduce(function(s,v){return s+v;},0)/postScores.length);
      var preMax = preScores[preScores.length-1];
      var preMin = preScores[0];
      html += '<div class="subsection">FSS Composite Distribution (Paired Cohort, n='+paired.length+')</div>';
      html += '<div class="tbl-wrap"><table><thead><tr><th>Metric</th><th>Pre FSS</th><th>Post FSS</th></tr></thead><tbody>';
      html += '<tr><td>Mean</td><td>'+preMean+'</td><td>'+postMean+'</td></tr>';
      html += '<tr><td>Min observed</td><td>'+pf(preMin)+'</td><td>'+pf(postScores[0])+'</td></tr>';
      html += '<tr><td>Max observed</td><td>'+pf(preMax)+'</td><td>'+pf(postScores[postScores.length-1])+'</td></tr>';
      html += '</tbody></table></div>';
      html += '<div class="footnote">FSS composite = sum of all 11 domain scores. Pre-mean of '+preMean+' relative to observed max of '+preMax+' shows '+(preMax>0?Math.round(100*preMean/preMax):'?')+'% utilization — if moms are starting near the top of the observable range, FSS improvement becomes structurally difficult.</div>';
    }
  }
  html += '</div></div>';

  return html;
}
</script>
</body>
</html>
