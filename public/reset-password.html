<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="/favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Your Password — ĒMA Impact Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Shrikhand&family=Oswald:wght@300;400;600&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--red:#ec482f;--red-dk:#c23018;--red-lt:#fef0ed;--green:#123939;--bg:#fdf7f3;--white:#fff;--dark:#2C2C2C;--mid:#5A5A5A;--border:#E0E0E0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 16px}
.card{width:100%;max-width:360px;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:40px 36px 36px;box-shadow:0 4px 24px rgba(0,0,0,.07)}
.logo{font-family:'Shrikhand',cursive;font-size:32px;color:var(--red);text-align:center;margin-bottom:24px}
.title{font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;color:var(--dark);text-align:center;margin-bottom:4px}
.subtitle{font-size:12px;color:var(--mid);text-align:center;margin-bottom:28px;line-height:1.5}
.error-msg{background:var(--red-lt);border:1px solid rgba(236,72,47,.2);border-left:3px solid var(--red);border-radius:6px;padding:9px 12px;font-size:12px;color:var(--red-dk);margin-bottom:18px;display:none}
.error-msg.show{display:block}
.success-msg{background:#ecefe1;border:1px solid rgba(18,57,57,.15);border-left:3px solid var(--green);border-radius:6px;padding:14px 12px;font-size:13px;color:var(--green);text-align:center;display:none}
.success-msg.show{display:block}
.success-msg a{color:var(--red);font-weight:700;text-decoration:none;display:inline-block;margin-top:8px;font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.8px;text-transform:uppercase}
.success-msg a:hover{color:var(--red-dk)}
.field{margin-bottom:16px}
.field label{display:block;font-family:'Oswald',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--mid);margin-bottom:6px}
.field input{width:100%;border:1px solid var(--border);border-radius:7px;padding:10px 12px;font-size:14px;background:#fafafa;transition:border .15s,box-shadow .15s}
.field input:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(236,72,47,.1);background:var(--white);outline:none}
.field input::placeholder{color:#c8c8c8}
.submit-btn{width:100%;background:var(--red);color:var(--white);border:none;border-radius:7px;padding:12px 0;font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;margin-top:6px;box-shadow:0 2px 8px rgba(236,72,47,.2);transition:background .15s,transform .1s}
.submit-btn:hover{background:var(--red-dk);transform:translateY(-1px)}
.submit-btn:active{transform:none}
.submit-btn:focus-visible{box-shadow:0 0 0 3px rgba(236,72,47,.3)}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">ĒMA</div>
  <div class="title">Reset Your Password</div>
  <div class="subtitle">Enter a new password</div>
  <div class="error-msg" id="error-msg"></div>
  <div class="success-msg" id="success-msg">
    Password reset successfully!<br>
    <a href="/hub">Go to Impact Hub &rarr;</a>
  </div>
  <form id="pw-form">
    <div class="field"><label>New Password</label><input id="pw" type="password" placeholder="Create a password" autocomplete="new-password" required></div>
    <div class="field"><label>Confirm Password</label><input id="pw-confirm" type="password" placeholder="Confirm password" autocomplete="new-password" required></div>
    <button class="submit-btn" type="submit">Reset Password &rarr;</button>
  </form>
</div>
<script>
(function(){
  var token = new URLSearchParams(window.location.search).get('token');
  var form = document.getElementById('pw-form');
  var errEl = document.getElementById('error-msg');
  var successEl = document.getElementById('success-msg');

  function showError(msg){
    errEl.textContent = msg;
    errEl.className = 'error-msg show';
  }

  if(!token){
    showError('Invalid reset link — no token found.');
    form.style.display = 'none';
    return;
  }

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    errEl.className = 'error-msg';
    var pw = document.getElementById('pw').value;
    var pw2 = document.getElementById('pw-confirm').value;

    if(pw.length < 8){
      showError('Password must be at least 8 characters.');
      return;
    }
    if(pw !== pw2){
      showError('Passwords do not match.');
      return;
    }

    var btn = form.querySelector('.submit-btn');
    btn.disabled = true;
    btn.textContent = 'Resetting password\u2026';

    try{
      var res = await fetch('/api/champion/reset-password', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ token: token, password: pw })
      });
      var data = await res.json();
      if(!res.ok) throw new Error(data.error || 'Something went wrong');
      form.style.display = 'none';
      successEl.className = 'success-msg show';
    }catch(err){
      showError(err.message);
      btn.disabled = false;
      btn.textContent = 'Reset Password \u2192';
    }
  });
})();
</script>
</body>
</html>
